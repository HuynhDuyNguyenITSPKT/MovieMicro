spring:
  application:
    name: ${SPRING_APPLICATION_NAME:auth-service}
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${AUTH_DB_NAME:auth_service_db}
    username: ${DB_USERNAME:app_user}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${JPA_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:true}
    properties:
      hibernate:
        format_sql: ${JPA_FORMAT_SQL:true}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS:true}
server:
  port: ${SERVER_PORT:8081}
eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://localhost:8761/eureka}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  jwt:
    secret: ${JWT_SECRET:replace-with-a-very-long-random-secret-key-at-least-32-bytes}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  otp:
    expiration-minutes: ${OTP_EXPIRATION_MINUTES:5}
  google:
    client-id: ${GOOGLE_CLIENT_ID:}
  user-service:
    base-url: ${USER_SERVICE_BASE_URL:http://localhost:8082}
  internal-api-key: ${INTERNAL_API_KEY:internal-auth-key}